name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Build universal binary
        run: |
          cargo build --release --target aarch64-apple-darwin
          cargo build --release --target x86_64-apple-darwin
          lipo -create \
            target/aarch64-apple-darwin/release/eudamed2firstbase \
            target/x86_64-apple-darwin/release/eudamed2firstbase \
            -output target/release/eudamed2firstbase-universal

      - name: Create .app bundle
        run: |
          APP="target/release/eudamed2firstbase.app"
          rm -rf "$APP"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp target/release/eudamed2firstbase-universal "$APP/Contents/MacOS/eudamed2firstbase"
          cp assets/icon.icns "$APP/Contents/Resources/AppIcon.icns"
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          cat > "$APP/Contents/Info.plist" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleName</key><string>eudamed2firstbase</string>
              <key>CFBundleDisplayName</key><string>eudamed2firstbase</string>
              <key>CFBundleIdentifier</key><string>com.ywesee.eudamed2firstbase</string>
              <key>CFBundleVersion</key><string>${VERSION}</string>
              <key>CFBundleShortVersionString</key><string>${VERSION}</string>
              <key>CFBundleExecutable</key><string>eudamed2firstbase</string>
              <key>CFBundleIconFile</key><string>AppIcon</string>
              <key>CFBundlePackageType</key><string>APPL</string>
              <key>NSHighResolutionCapable</key><true/>
              <key>NSSupportsAutomaticGraphicsSwitching</key><true/>
              <key>LSMinimumSystemVersion</key><string>11.0</string>
              <key>LSApplicationCategoryType</key><string>public.app-category.business</string>
          </dict>
          </plist>
          EOF

      - name: Import signing certificates
        if: env.MACOS_CERTIFICATE != ''
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_INSTALLER_CERTIFICATE: ${{ secrets.MACOS_INSTALLER_CERTIFICATE }}
          MACOS_INSTALLER_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_INSTALLER_CERTIFICATE_PASSWORD }}
        run: |
          security create-keychain -p "" build.keychain
          security set-keychain-settings build.keychain
          security list-keychains -d user -s build.keychain

          echo "$MACOS_CERTIFICATE" | base64 --decode > app_cert.p12
          security import app_cert.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productbuild
          rm app_cert.p12

          if [ -n "$MACOS_INSTALLER_CERTIFICATE" ]; then
            echo "$MACOS_INSTALLER_CERTIFICATE" | base64 --decode > installer_cert.p12
            security import installer_cert.p12 -k build.keychain -P "$MACOS_INSTALLER_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productbuild
            rm installer_cert.p12
          fi

          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain

          echo "Available signing identities:"
          security find-identity -v build.keychain

      - name: Code sign app
        if: env.MACOS_CERTIFICATE != ''
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
        run: |
          IDENTITY=$(security find-identity -v build.keychain | grep "Mac App Distribution\|3rd Party Mac Developer Application" | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "Signing with: $IDENTITY"
          codesign --force --options runtime \
            --sign "$IDENTITY" \
            --entitlements entitlements.plist \
            --deep \
            target/release/eudamed2firstbase.app

      - name: Create DMG
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          STAGING=$(mktemp -d)
          cp -R target/release/eudamed2firstbase.app "$STAGING/"
          ln -s /Applications "$STAGING/Applications"
          hdiutil create -volname "eudamed2firstbase" \
            -srcfolder "$STAGING" \
            -ov -format UDZO \
            "eudamed2firstbase-${VERSION}-macos-universal.dmg"
          rm -rf "$STAGING"

      - name: Notarize (if credentials available)
        if: env.APPLE_ID != ''
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          DMG="eudamed2firstbase-${VERSION}-macos-universal.dmg"
          xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait
          xcrun stapler staple "$DMG"

      - name: Upload macOS DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: eudamed2firstbase-*-macos-universal.dmg

      - name: Build App Store package (if API key available)
        if: env.APPLE_API_KEY_P8 != ''
        env:
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          MACOS_PROVISIONING_PROFILE: ${{ secrets.MACOS_PROVISIONING_PROFILE }}
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          APP="target/release/eudamed2firstbase.app"

          # Embed provisioning profile in .app bundle
          if [ -n "$MACOS_PROVISIONING_PROFILE" ]; then
            echo "$MACOS_PROVISIONING_PROFILE" | base64 --decode > "$APP/Contents/embedded.provisionprofile"
            echo "Embedded provisioning profile"
          fi

          # Re-sign with App Store entitlements (sandbox)
          APP_IDENTITY=$(security find-identity -v build.keychain | grep "Mac App Distribution\|3rd Party Mac Developer Application" | head -1 | sed 's/.*"\(.*\)"/\1/' || true)
          if [ -n "$APP_IDENTITY" ]; then
            echo "Signing app with: $APP_IDENTITY"
            codesign --force --options runtime \
              --sign "$APP_IDENTITY" \
              --entitlements entitlements-appstore.plist \
              --deep \
              "$APP"
          fi

          # Create signed .pkg for App Store upload
          INSTALLER_IDENTITY=$(security find-identity -v build.keychain | grep "Mac Installer Distribution\|3rd Party Mac Developer Installer" | head -1 | sed 's/.*"\(.*\)"/\1/' || true)
          if [ -n "$INSTALLER_IDENTITY" ]; then
            echo "Signing pkg with: $INSTALLER_IDENTITY"
            productbuild --component "$APP" /Applications \
              --sign "$INSTALLER_IDENTITY" \
              "eudamed2firstbase-${VERSION}-macos-appstore.pkg"
          else
            productbuild --component "$APP" /Applications \
              "eudamed2firstbase-${VERSION}-macos-appstore.pkg"
          fi

          # Store the API key for xcrun
          mkdir -p ~/.private_keys
          echo "$APPLE_API_KEY_P8" > ~/.private_keys/AuthKey_${APPLE_API_KEY_ID}.p8

          # Upload to App Store Connect
          xcrun altool --upload-app \
            --file "eudamed2firstbase-${VERSION}-macos-appstore.pkg" \
            --type macos \
            --apiKey "$APPLE_API_KEY_ID" \
            --apiIssuer "$APPLE_API_ISSUER_ID" || echo "WARNING: App Store upload failed (app may not be created in App Store Connect yet)"

      - name: Upload App Store pkg artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: macos-appstore-pkg
          path: eudamed2firstbase-*-macos-appstore.pkg
          if-no-files-found: ignore

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release

      - name: Create portable ZIP
        shell: pwsh
        run: |
          $version = (Select-String -Path Cargo.toml -Pattern '^version = "(.+)"' | Select-Object -First 1).Matches.Groups[1].Value
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item target\release\eudamed2firstbase.exe dist\
          Compress-Archive -Path dist\* -DestinationPath "eudamed2firstbase-${version}-windows-x64.zip"

      - name: Create MSIX package for Windows Store
        shell: pwsh
        run: |
          $version = (Select-String -Path Cargo.toml -Pattern '^version = "(.+)"' | Select-Object -First 1).Matches.Groups[1].Value

          # Find Windows SDK tools dynamically
          $sdkBin = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\10.*\x64\makeappx.exe" -ErrorAction SilentlyContinue | Sort-Object -Descending | Select-Object -First 1
          if (-not $sdkBin) {
            Write-Error "makeappx.exe not found in Windows SDK"
            exit 1
          }
          $sdkDir = $sdkBin.DirectoryName
          Write-Host "Using Windows SDK at: $sdkDir"

          # Prepare MSIX layout
          $msixDir = "msix_staging"
          New-Item -ItemType Directory -Force -Path $msixDir
          Copy-Item target\release\eudamed2firstbase.exe $msixDir\

          # Update version in manifest and copy
          $manifest = Get-Content windows\AppxManifest.xml -Raw
          $manifest = $manifest -replace 'Version="1\.0\.0\.0"', "Version=`"${version}.0`""
          Set-Content -Path "$msixDir\AppxManifest.xml" -Value $manifest

          # Copy assets into msix staging
          New-Item -ItemType Directory -Force -Path "$msixDir\assets"
          Copy-Item windows\assets\* "$msixDir\assets\"

          # Create MSIX using makeappx
          & "$sdkDir\makeappx.exe" pack /d $msixDir /p "eudamed2firstbase-${version}-windows-x64.msix" /o

      - name: Sign MSIX (if certificate available)
        if: env.WINDOWS_CERTIFICATE != ''
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          $version = (Select-String -Path Cargo.toml -Pattern '^version = "(.+)"' | Select-Object -First 1).Matches.Groups[1].Value
          $sdkBin = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\10.*\x64\signtool.exe" -ErrorAction SilentlyContinue | Sort-Object -Descending | Select-Object -First 1
          $certBytes = [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE)
          [IO.File]::WriteAllBytes("cert.pfx", $certBytes)
          & $sdkBin.FullName sign /fd SHA256 /a /f cert.pfx /p $env:WINDOWS_CERTIFICATE_PASSWORD "eudamed2firstbase-${version}-windows-x64.msix"
          Remove-Item cert.pfx

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-packages
          path: |
            eudamed2firstbase-*-windows-x64.zip
            eudamed2firstbase-*-windows-x64.msix

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/macos-dmg/*.dmg
            artifacts/windows-packages/*.zip
            artifacts/windows-packages/*.msix
          generate_release_notes: true

  publish-microsoft-store:
    needs: [build-windows]
    runs-on: windows-latest
    if: vars.MSSTORE_ENABLED == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-packages
          path: artifacts

      - name: Publish to Microsoft Store
        shell: pwsh
        env:
          MSSTORE_TENANT_ID: ${{ secrets.MSSTORE_TENANT_ID }}
          MSSTORE_CLIENT_ID: ${{ secrets.MSSTORE_CLIENT_ID }}
          MSSTORE_CLIENT_SECRET: ${{ secrets.MSSTORE_CLIENT_SECRET }}
        run: |
          $msix = Get-ChildItem artifacts/*.msix | Select-Object -First 1
          Write-Host "Submitting: $($msix.FullName)"

          # Get OAuth2 token from Azure AD
          $tokenBody = @{
            grant_type    = "client_credentials"
            client_id     = $env:MSSTORE_CLIENT_ID
            client_secret = $env:MSSTORE_CLIENT_SECRET
            resource      = "https://manage.devcenter.microsoft.com"
          }
          $tokenResp = Invoke-RestMethod -Method Post `
            -Uri "https://login.microsoftonline.com/$($env:MSSTORE_TENANT_ID)/oauth2/token" `
            -Body $tokenBody
          $token = $tokenResp.access_token
          Write-Host "Got access token"

          $headers = @{
            Authorization = "Bearer $token"
            "Content-Type" = "application/json"
          }

          # Get app info and current submission
          $appId = "9P889JD1XWS2"
          $appResp = Invoke-RestMethod -Method Get `
            -Uri "https://manage.devcenter.microsoft.com/v1.0/my/applications/$appId" `
            -Headers $headers
          Write-Host "App: $($appResp.primaryName)"

          # If there's a pending submission, delete it
          if ($appResp.pendingApplicationSubmission) {
            $pendingId = $appResp.pendingApplicationSubmission.id
            Write-Host "Deleting pending submission: $pendingId"
            Invoke-RestMethod -Method Delete `
              -Uri "https://manage.devcenter.microsoft.com/v1.0/my/applications/$appId/submissions/$pendingId" `
              -Headers $headers
          }

          # Create new submission (clones the last published one)
          $subResp = Invoke-RestMethod -Method Post `
            -Uri "https://manage.devcenter.microsoft.com/v1.0/my/applications/$appId/submissions" `
            -Headers $headers
          $subId = $subResp.id
          $uploadUrl = $subResp.fileUploadUrl
          Write-Host "Created submission: $subId"
          Write-Host "Upload URL available: $($uploadUrl.Length -gt 0)"

          # Update submission: add our MSIX package and set required fields
          $submission = $subResp
          $msixFileName = $msix.Name

          # Set application category (required)
          $submission.applicationCategory = "BooksAndReference_EReader"

          # Set store listing (required: at least one language)
          $submission.listings = @{
            "en-us" = @{
              baseListing = @{
                title = "Eudamed2Firstbase"
                description = "Convert EUDAMED medical device data to GS1 firstbase and Swissdamed JSON format. Download from the EU EUDAMED database, convert to GS1 GDSN format, and push to firstbase or Swissdamed APIs."
                releaseNotes = "Initial release"
                keywords = @("EUDAMED", "medical device", "GS1", "firstbase", "UDI", "Swissdamed")
                copyrightAndTrademarkInfo = "Copyright 2026 ywesee GmbH"
                licenseTerms = "GNU General Public License v3.0"
                privacyPolicy = "https://github.com/zdavatz/eudamed2firstbase"
                websiteUrl = "https://github.com/zdavatz/eudamed2firstbase"
                images = @()
              }
            }
          }

          # Remove old packages (mark as PendingDelete)
          if ($submission.applicationPackages) {
            foreach ($pkg in $submission.applicationPackages) {
              $pkg.fileStatus = "PendingDelete"
            }
          } else {
            $submission.applicationPackages = @()
          }

          # Add our new package
          $newPackage = @{
            fileName = $msixFileName
            fileStatus = "PendingUpload"
            minimumDirectXVersion = "None"
            minimumSystemRam = "None"
          }
          $submission.applicationPackages += $newPackage

          # PUT the updated submission JSON
          $updateBody = $submission | ConvertTo-Json -Depth 20 -Compress
          Invoke-RestMethod -Method Put `
            -Uri "https://manage.devcenter.microsoft.com/v1.0/my/applications/$appId/submissions/$subId" `
            -Headers $headers `
            -Body $updateBody `
            -ContentType "application/json; charset=utf-8"
          Write-Host "Updated submission with package: $msixFileName"

          # Upload MSIX as ZIP to the Azure Blob upload URL
          # The ZIP must contain the MSIX file with the exact name specified above
          $zipPath = [System.IO.Path]::Combine($env:TEMP, "upload.zip")
          Compress-Archive -Path $msix.FullName -DestinationPath $zipPath -Force
          $zipBytes = [System.IO.File]::ReadAllBytes($zipPath)
          Invoke-RestMethod -Method Put -Uri $uploadUrl `
            -Headers @{"x-ms-blob-type" = "BlockBlob"} `
            -Body $zipBytes `
            -ContentType "application/octet-stream"
          Write-Host "Uploaded package ZIP ($([math]::Round($zipBytes.Length/1MB, 2)) MB)"

          # Commit the submission
          $commitResp = Invoke-RestMethod -Method Post `
            -Uri "https://manage.devcenter.microsoft.com/v1.0/my/applications/$appId/submissions/$subId/commit" `
            -Headers $headers
          Write-Host "Submission committed: $subId"
          Write-Host "Commit status: $($commitResp.status)"
