# config.sample.toml — copy to config.toml and fill in your values.
# config.toml is gitignored so secrets never end up in the repository.

# ---------------------------------------------------------------------------
# GS1 provider identity
# ---------------------------------------------------------------------------
[provider]
gln         = "7612345000480"                  # Your GS1 provider GLN
party_name  = "EUDAMED Public Importer"
publish_gln = "7612345000527"                  # Default recipient GLN for pushes (e.g. GS1 Switzerland UDI Data Dump)

# ---------------------------------------------------------------------------
# GDSN target market
# ---------------------------------------------------------------------------
[target_market]
country_code = "097"   # 097 = Austria (pilot); 756 = Switzerland

# ---------------------------------------------------------------------------
# GPC classification codes (Medical Devices)
# ---------------------------------------------------------------------------
[gpc]
segment_code  = "51000000"
class_code    = "51150100"
family_code   = "51150000"
category_code = "10005844"
category_name = "Medical Devices"

# ---------------------------------------------------------------------------
# Gmail service-account credentials (used by the `mailto` command only).
# The .p12 file must NOT be committed to the repository.
# ---------------------------------------------------------------------------
[gmail]
p12_key       = "/path/to/your-service-account.p12"
service_email = "your-service-account@your-project.iam.gserviceaccount.com"

# ---------------------------------------------------------------------------
# Customer SRN worklist Google Sheet (used by `sync-srns` for the nightly
# `check`). Read-only via the SAME service account as [gmail] above — share the
# sheet with that service-account email as Viewer. spreadsheet_id is the long
# token in the sheet URL.
# ---------------------------------------------------------------------------
[sheet]
spreadsheet_id = "your-spreadsheet-id"
srn_range      = "eudamed2firstbase_SRN!B1:B"   # first column of range = SRN

# ---------------------------------------------------------------------------
# GS1 Production push-report recipients (used by send_gs1_prod_report). Kept
# here (gitignored) so no mail addresses are committed to source. Env vars
# GS1_REPORT_TO / GS1_REPORT_FROM override these when set.
# ---------------------------------------------------------------------------
[gs1_report]
to   = "recipient@example.com"                  # comma-separated for several
from = "sender@example.com"

# ---------------------------------------------------------------------------
# Endocrine substance EC/CAS identifiers (looked up by substance name).
# Add entries as needed; the keys must match EUDAMED substance names exactly.
# ---------------------------------------------------------------------------
[endocrine_substances.Estradiol]
ec_number  = "200-023-8"
cas_number = "50-28-2"
